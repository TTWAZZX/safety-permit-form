<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ระบบลงเวลา รปภ. - Thai Summit Harness</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.bootstrap5.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        /* ================= CORPORATE SECURITY THEME ================= */
        :root {
            --primary-color: #0f2027; 
            --secondary-color: #203a43;
            --accent-color: #d4af37; 
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #212529;
            --border-color: #dee2e6;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #f8f9fa;
            --border-color: #343a40;
        }

        /* 📱 ปรับ padding-bottom ให้พอดีกับเมนูด้านล่าง */
        body { font-family: 'Sarabun', sans-serif; background-color: var(--bg-color); color: var(--text-main); padding-bottom: 90px; transition: 0.3s; }
        .container { max-width: 500px; padding: 0 15px; display: none; }

        /* ================= LOADING SCREEN ================= */
        #loadingScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .spinner-border { color: var(--accent-color); width: 3rem; height: 3rem; margin-bottom: 15px; }

        /* ================= HEADER & PROFILE ================= */
        .profile-header { background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); color: white; padding: 30px 20px; border-radius: 0 0 30px 30px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.1); position: relative; }
        .profile-img { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--accent-color); object-fit: cover; background: white; padding: 2px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .theme-toggle { background: rgba(255,255,255,0.1); border: none; color: white; border-radius: 50%; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; transition: 0.3s;}
        
        /* 🔄 อนิเมชันปุ่มรีเฟรช */
        .bi-spin { animation: spinIcon 1s linear infinite; }
        @keyframes spinIcon { 100% { transform: rotate(360deg); } }

        /* ================= INFO CARDS ================= */
        .info-card { background: var(--card-bg); border-radius: 16px; padding: 15px; text-align: center; border: 1px solid var(--border-color); box-shadow: 0 4px 10px rgba(0,0,0,0.03); margin-top: -20px; position: relative; z-index: 2; }
        .clock-display { font-size: 2.5rem; font-weight: 700; font-family: monospace; color: var(--accent-color); letter-spacing: 2px; line-height: 1; margin-top: 5px; }

        .main-card { background: var(--card-bg); border-radius: 20px; padding: 25px 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.05); border: 1px solid var(--border-color); margin-top: 15px; }

        .form-label { font-size: 0.85rem; font-weight: 700; color: #6c757d; text-transform: uppercase; }
        .form-control, .form-select { border-radius: 10px; border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-main); padding: 12px; font-weight: 500; }
        .form-control:focus, .form-select:focus { border-color: var(--accent-color); box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2); }
        .form-control[readonly] { background-color: rgba(0,0,0,0.03); }

        /* TomSelect Theme */
        .ts-control { border-radius: 10px; padding: 12px; border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-main); }
        .ts-dropdown { border-radius: 10px; background: var(--card-bg); color: var(--text-main); border: 1px solid var(--border-color); }
        .ts-dropdown .active { background-color: rgba(212, 175, 55, 0.1); color: var(--text-main); }

        .btn-submit { background: var(--primary-color); color: white; width: 100%; border-radius: 12px; padding: 15px; font-weight: 700; font-size: 1.1rem; border: none; box-shadow: 0 6px 15px rgba(15, 32, 39, 0.3); transition: 0.2s; }
        .btn-submit:active { transform: scale(0.98); }
        .btn-submit:disabled { background: #6c757d; box-shadow: none; }

        /* ================= HISTORY ================= */
        .history-item { background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 12px; border-left: 4px solid var(--accent-color); border-right: 1px solid var(--border-color); border-top: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .action-btn { background: none; border: none; color: #6c757d; font-size: 1.1rem; padding: 5px; transition: 0.2s; }
        .action-btn:hover { color: var(--primary-color); transform: scale(1.1); }
        .action-btn.delete:hover { color: #dc3545; }

        /* ================= 📱 BOTTOM NAVIGATION (App Style) ================= */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--card-bg); border-top: 1px solid var(--border-color);
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05); z-index: 1000;
            display: flex; justify-content: space-around; padding: 10px 0 15px;
            padding-bottom: env(safe-area-inset-bottom); /* รองรับขอบจอมือถือ */
        }
        .bottom-nav .nav-item {
            text-align: center; color: #6c757d; text-decoration: none;
            font-size: 0.85rem; font-weight: 700; display: flex; flex-direction: column; align-items: center; transition: 0.2s; width: 50%;
        }
        .bottom-nav .nav-item i { font-size: 1.6rem; margin-bottom: 2px; }
        .bottom-nav .nav-item.active { color: var(--accent-color); }
        
        /* ซ่อน/โชว์ หน้าต่าง */
        .page-section { display: none; }
        .page-section.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ขยายขนาดแถวใน Dropdown ให้จิ้มง่ายขึ้นสำหรับมือถือ */
        .ts-dropdown .option {
            padding: 12px 15px !important;
            font-size: 1.1rem !important;
        }
    </style>
</head>
<body>

<div id="loadingScreen">
    <div class="spinner-border" role="status"></div>
    <div class="fw-bold fs-5" style="color: var(--primary-color);"><i class="bi bi-shield-lock-fill me-2"></i>Security System</div>
    <div class="text-muted small mt-2" id="loadStatusMain">เชื่อมต่อฐานข้อมูล...</div>
</div>

<div class="profile-header animate__animated animate__fadeInDown">
    <div class="position-absolute d-flex gap-2" style="top: 15px; right: 15px;">
        <button class="theme-toggle" onclick="refreshData()" title="รีเฟรชข้อมูล">
            <i class="bi bi-arrow-clockwise" id="refreshIcon"></i>
        </button>
        <button class="theme-toggle" onclick="toggleTheme()" title="สลับโหมดสี">
            <i class="bi bi-moon-stars-fill" id="themeIcon"></i>
        </button>
    </div>

    <img id="profileImage" src="https://cdn-icons-png.flaticon.com/512/847/847969.png" class="profile-img mb-3">
    <h5 id="displayName" class="fw-bold mb-1">รปภ. ปฏิบัติการ</h5>
    <span class="badge bg-light text-dark bg-opacity-75"><i class="bi bi-person-badge-fill me-1"></i> เจ้าหน้าที่รักษาความปลอดภัย</span>
</div>

<div class="container" id="mainApp">
    
    <div class="info-card mx-3">
        <div class="small fw-bold text-muted text-uppercase"><i class="bi bi-geo-alt-fill text-danger me-1"></i> สถานที่ปฏิบัติงาน</div>
        <div class="fw-bold" style="color: var(--primary-color); font-size: 1.1rem;">บริษัท ไทยซัมมิท ฮาร์เนส จำกัด (มหาชน)</div>
        <hr class="my-2 opacity-25">
        <div class="small fw-bold text-muted text-uppercase"><i class="bi bi-clock-fill text-primary me-1"></i> เวลามาตรฐาน (ไทย)</div>
        <div class="clock-display" id="liveClock">00:00:00</div>
    </div>

    <div id="formPage" class="page-section active">
        <div class="main-card">
            <form id="attendanceForm">
                <input type="hidden" id="picUrl">

                <div class="row g-3 mb-3">
                    <div class="col-6">
                        <label class="form-label">
                            <i class="bi bi-calendar-event me-1"></i> วันที่ทำงาน
                        </label>
                        <input type="date" id="work_date" class="form-control" required>
                    </div>
                    <div class="col-6">
                        <label class="form-label">
                            <i class="bi bi-arrow-repeat me-1"></i> กะการทำงาน
                        </label>
                        <select id="shift" class="form-select" required>
                            <option value="" disabled selected>เลือกกะ...</option>
                            <option value="กะเช้า (06:00-18:00)">กะเช้า (06:00-18:00)</option>
                            <option value="กะดึก (18:00-06:00)">กะดึก (18:00-06:00)</option>
                        </select>
                    </div>
                </div>

                <!-- 🔵 เลือกโหมดก่อน -->
                <div class="mb-3 text-center">
                    <div class="btn-group w-100">
                        <button type="button"
                                class="btn btn-outline-primary active"
                                id="modeWork"
                                onclick="setMode('work')">
                            ลงเวลา
                        </button>
                        <button type="button"
                                class="btn btn-outline-danger"
                                id="modeLeave"
                                onclick="setMode('leave')">
                            ลางาน
                        </button>
                    </div>
                </div>

                <!-- 🔵 Leave Type (ซ่อนอยู่จนกว่าจะกดลางาน) -->
                <div class="mb-3 d-none" id="leaveTypeDiv">
                    <label class="form-label text-danger">
                        <i class="bi bi-calendar-x me-1"></i> ประเภทการลา
                    </label>
                    <select id="leave_type" class="form-select">
                        <option value="">เลือกประเภทการลา...</option>
                        <option value="ลาป่วย">ลาป่วย</option>
                        <option value="ลากิจ">ลากิจ</option>
                        <option value="ลาพักร้อน">ลาพักร้อน</option>
                        <option value="ขาดงาน">ขาดงาน</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        <i class="bi bi-upc-scan me-1"></i> รหัสบัตรประจำตัว
                    </label>
                    <select id="id_card" required placeholder="ค้นหารหัสบัตร..."></select>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        <i class="bi bi-person-vcard me-1"></i> ชื่อ-นามสกุลผู้ปฏิบัติงาน
                    </label>
                    <select id="fullname" required placeholder="ค้นหาชื่อ-นามสกุล..."></select>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-6">
                        <label class="form-label text-success"><i class="bi bi-box-arrow-in-right me-1"></i> เวลาเข้า</label>
                        <input type="text" id="time_in" class="form-control fw-bold text-success fs-5 text-center" placeholder="-- : --" inputmode="numeric" maxlength="5" oninput="formatTime(this)">
                    </div>
                    <div class="col-6">
                        <label class="form-label text-danger"><i class="bi bi-box-arrow-right me-1"></i> เวลาออก</label>
                        <input type="text" id="time_out" class="form-control fw-bold text-danger fs-5 text-center" placeholder="-- : --" inputmode="numeric" maxlength="5" oninput="formatTime(this)">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label"><i class="bi bi-journal-text me-1"></i> หมายเหตุการปฏิบัติงาน</label>
                    <select id="remark_type" class="form-select" onchange="handleRemarkChange()">
                        <option value="ปกติ" selected>ปฏิบัติงานปกติ</option>
                        <option value="ควงเปลี่ยนกะ 24 ชั่วโมง">ควงเปลี่ยนกะ 24 ชั่วโมง</option>
                        <option value="แทน (หัวหน้าชุด รปภ.)">แทน (หัวหน้าชุด รปภ.)</option>
                        <option value="แทน (รปภ.)">แทน (รปภ.)</option>
                        <option value="อื่นๆ">อื่นๆ (ระบุด้วยตนเอง)</option>
                    </select>
                </div>
                
                <div class="mb-4 d-none" id="remark_substitute_div">
                    <label class="form-label text-warning"><i class="bi bi-people-fill me-1"></i> ปฏิบัติงานแทนผู้ใด?</label>
                    <select id="remark_substitute" placeholder="ค้นหาชื่อผู้ที่ถูกแทน..."></select>
                </div>

                <div class="mb-4 d-none" id="remark_other_div">
                    <label class="form-label text-warning"><i class="bi bi-pencil-square me-1"></i> ระบุรายละเอียด</label>
                    <input type="text" id="remark_detail" class="form-control" placeholder="ระบุเหตุผลเพิ่มเติม...">
                </div>

                <button type="submit" id="btnSubmit" class="btn-submit mt-2">
                    <i class="bi bi-cloud-arrow-up-fill me-2"></i> บันทึกเวลาเข้าสู่ระบบ
                </button>
            </form>
        </div>
    </div>

    <div id="historyPage" class="page-section pt-3">
        <h5 class="fw-bold mb-3" style="color: var(--primary-color);"><i class="bi bi-clock-history me-2"></i>ประวัติการปฏิบัติงาน</h5>
        
        <ul class="nav nav-pills nav-fill mb-3" id="historyTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="tab-today-btn" data-bs-toggle="pill" data-bs-target="#tab-today" type="button">วันนี้</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="tab-past-btn" data-bs-toggle="pill" data-bs-target="#tab-past" type="button">ย้อนหลัง</button>
            </li>
        </ul>
        <div class="tab-content" id="historyTabsContent">
            <div class="tab-pane fade show active" id="tab-today">
                <div id="listToday"><div class="text-center text-muted small py-3">กำลังโหลด...</div></div>
            </div>
            <div class="tab-pane fade" id="tab-past">
                <div id="listPast"><div class="text-center text-muted small py-3">กำลังโหลด...</div></div>
                <div class="text-center mt-3 mb-4 d-none" id="btnLoadMoreContainer">
                    <button id="btnLoadMore" onclick="loadMorePast()" class="btn btn-outline-secondary rounded-pill px-4 btn-sm fw-bold">
                        ดูประวัติเก่ากว่านี้ <i class="bi bi-chevron-down"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

</div>

<nav class="bottom-nav no-print">
    <a href="#" class="nav-item active" id="nav-form" onclick="switchPage('form')">
        <i class="bi bi-shield-check"></i>
        <span>ลงเวลา</span>
    </a>
    <a href="#" class="nav-item" id="nav-history" onclick="switchPage('history')">
        <i class="bi bi-card-list"></i>
        <span>ประวัติ</span>
    </a>
</nav>

<script>
// ================= CONFIG =================
const SUPABASE_URL = 'https://dqsfioiqwxuxpucwwhsv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRxc2Zpb2lxd3h1eHB1Y3d3aHN2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg1OTk1NjUsImV4cCI6MjA4NDE3NTU2NX0.L_u0Ff3uHofxiimEs6ySFB4TPNtOWiKeSu3KFoVcA1U';
const LIFF_ID = '2007053300-gJitj7Vr';

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let selectCardInstance, selectPersonInstance, selectSubstituteInstance;
let activeRecordId = null; 
let currentMode = 'work'; // โหมดเริ่มต้น

// 🟢 ตัวแปรสำหรับระบบแบ่งหน้า (Pagination)
let currentPastPage = 1;
const ITEMS_PER_PAGE = 10;

// ================= INIT =================
window.onload = async () => {
    initTheme();
    startLiveClock();
    document.getElementById('work_date').valueAsDate = new Date();

    try {
        await updateLoader("กำลังอัปเดตข้อมูลผู้ใช้...", 300);
        await liff.init({ liffId: LIFF_ID });
        
        if (!liff.isLoggedIn()) { liff.login(); return; }

        const profile = await liff.getProfile();
        document.getElementById('displayName').innerText = profile.displayName;
        if(profile.pictureUrl) {
            document.getElementById('profileImage').src = profile.pictureUrl;
            document.getElementById('picUrl').value = profile.pictureUrl;
        }

        await updateLoader("เตรียมพร้อมระบบ...", 200);
        await Promise.all([loadMasterData(), fetchHistory()]);

        document.getElementById('loadingScreen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';

    } catch (err) { 
        console.error('LIFF Error:', err);
        await Promise.all([loadMasterData(), fetchHistory()]);
        document.getElementById('loadingScreen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
    }
};

function updateLoader(text, delay) { return new Promise(r => { document.getElementById('loadStatusMain').innerText = text; setTimeout(r, delay); }); }

// ================= 📱 APP NAVIGATION =================
function switchPage(page) {
    document.getElementById('formPage').classList.remove('active');
    document.getElementById('historyPage').classList.remove('active');
    document.getElementById('nav-form').classList.remove('active');
    document.getElementById('nav-history').classList.remove('active');

    if(page === 'form') {
        document.getElementById('formPage').classList.add('active');
        document.getElementById('nav-form').classList.add('active');
    } else {
        document.getElementById('historyPage').classList.add('active');
        document.getElementById('nav-history').classList.add('active');
        fetchHistory(); 
    }
}

// ================= CLOCK & THEME =================
function startLiveClock() { setInterval(() => { document.getElementById('liveClock').innerText = new Date().toLocaleTimeString('th-TH', { hour12: false }); }, 1000); }
function initTheme() {
    const savedTheme = localStorage.getItem('sec_theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    document.getElementById('themeIcon').className = savedTheme === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-stars-fill';
}
function toggleTheme() {
    const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('sec_theme', next);
    document.getElementById('themeIcon').className = next === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-stars-fill';
}

// ================= 🔄 SOFT REFRESH DATA =================
async function refreshData() {
    const icon = document.getElementById('refreshIcon');
    icon.classList.add('bi-spin'); 
    
    Swal.fire({
        title: 'กำลังซิงค์ข้อมูล...',
        text: 'กรุณารอสักครู่ ระบบกำลังอัปเดตข้อมูลล่าสุด',
        allowOutsideClick: false,
        didOpen: () => { Swal.showLoading(); }
    });

    try {
        await Promise.all([ loadMasterData(), fetchHistory() ]);
        if (typeof checkActiveSession === "function") await checkActiveSession();

        Swal.fire({ icon: 'success', title: 'อัปเดตข้อมูลเรียบร้อย', timer: 1000, showConfirmButton: false });
    } catch (error) {
        Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาด', text: 'ไม่สามารถดึงข้อมูลได้', confirmButtonColor: '#1e3a8a' });
    } finally {
        icon.classList.remove('bi-spin');
    }
}

// ================= 🟢 SMART CHECK-IN/OUT =================
async function checkActiveSession() {
    const id_card = document.getElementById('id_card').value;
    const fullname = document.getElementById('fullname').value;
    const todayStr = document.getElementById('work_date').value;

    const timeInInput = document.getElementById('time_in');
    const btnSubmit = document.getElementById('btnSubmit');
    
    // รีเซ็ต UI
    activeRecordId = null;
    timeInInput.disabled = false;
    timeInInput.value = '';
    timeInInput.parentElement.style.opacity = "1";
    btnSubmit.innerHTML = '<i class="bi bi-cloud-arrow-up-fill me-2"></i> บันทึกเวลาเข้าสู่ระบบ';

    if (!id_card || !fullname) return;

    try {
        const { data, error } = await db.from('guard_attendance')
            .select('*')
            .eq('id_card', id_card)
            .eq('fullname', fullname)
            .eq('work_date', todayStr)
            .is('time_out', null) // หาช่องเวลาออกที่ยังว่าง
            .not('time_in', 'is', null) // แต่ช่องเวลาเข้าต้องไม่ว่าง
            .order('created_at', { ascending: false })
            .limit(1);

        if (data && data.length > 0) {
            // เจอว่ากำลังเข้าเวรอยู่ (ล็อกเวลาเข้า)
            activeRecordId = data[0].id;
            timeInInput.value = data[0].time_in;
            timeInInput.disabled = true;
            timeInInput.parentElement.style.opacity = "0.5";
            btnSubmit.innerHTML = '<i class="bi bi-box-arrow-right me-2"></i> บันทึกเวลาออกงาน';
        }
    } catch (err) {
        console.error("Check Session Error:", err);
    }
}

        // เคลียร์ TomSelect เก่าออกก่อนป้องกัน Error ตอน Refresh

        if (persons) {

                selectSub.innerHTML += `<option value="${p.fullname}">${p.fullname}</option>`;

        // สำหรับพนักงานปฏิบัติงาน
        selectPersonInstance = new TomSelect("#fullname", {

            sortField: { field: "text", direction: "asc" },
            controlInput: null, // 🟢 ปิดช่องพิมพ์ค้นหา ให้เลือกอย่างเดียว

        // สำหรับรายชื่อคนถูกแทนในช่องหมายเหตุ
        selectSubstituteInstance = new TomSelect("#remark_substitute", { 
            create: false, 
            sortField: { field: "text", direction: "asc" },
            controlInput: null // 🟢 ปิดช่องพิมพ์ค้นหา ให้เลือกอย่างเดียว

        if(localStorage.getItem('sec_last_shift')) document.getElementById('shift').value = localStorage.getItem('sec_last_shift');
        
        checkActiveSession(); 
    } catch (err) { console.error("Load Master Error:", err); }
}
// ================= ⏰ CUSTOM TIME FORMATTER (Numpad) =================
function formatTime(input) {
    let val = input.value.replace(/\D/g, ''); 
    if (val.length > 2) {
        val = val.substring(0, 2) + ':' + val.substring(2, 4); 
    }
    input.value = val;
}
function validateTimeStr(timeStr) {
    if (!timeStr) return true;
    if (timeStr.length !== 5) return false;
    const [h, m] = timeStr.split(':');
    if (parseInt(h) > 23 || parseInt(m) > 59) return false;
    return true;
}

// ================= 📝 REMARK LOGIC =================
function handleRemarkChange() {
    const val = document.getElementById('remark_type').value;
    const subDiv = document.getElementById('remark_substitute_div');
    const otherDiv = document.getElementById('remark_other_div');

    subDiv.classList.add('d-none');
    otherDiv.classList.add('d-none');
    document.getElementById('remark_detail').value = '';
    selectSubstituteInstance.clear();

    if (val.includes('แทน')) {
        subDiv.classList.remove('d-none'); 
    } else if (val === 'อื่นๆ') {
        otherDiv.classList.remove('d-none'); 
        document.getElementById('remark_detail').focus();
    }
}

// ================= 🏖️ MODE SWITCH (WORK / LEAVE) =================
function setMode(mode) {
    currentMode = mode;

    const leaveDiv = document.getElementById('leaveTypeDiv');
    const timeRow = document.getElementById('time_in').closest('.row');
    const btn = document.getElementById('btnSubmit');

    document.getElementById('modeWork').classList.remove('active');
    document.getElementById('modeLeave').classList.remove('active');

    if (mode === 'leave') {
        leaveDiv.classList.remove('d-none');
        timeRow.classList.add('d-none');
        btn.innerHTML = '<i class="bi bi-calendar-x me-2"></i> บันทึกลางาน';
        document.getElementById('modeLeave').classList.add('active');

        // เคลียร์เวลาออก/เข้า
        document.getElementById('time_in').value = '';
        document.getElementById('time_out').value = '';
    } else {
        leaveDiv.classList.add('d-none');
        timeRow.classList.remove('d-none');
        btn.innerHTML = '<i class="bi bi-cloud-arrow-up-fill me-2"></i> บันทึกเวลาเข้าสู่ระบบ';
        document.getElementById('modeWork').classList.add('active');
    }
}

// ================= HISTORY (ระบบใหม่ เฉพาะบุคคล + วันที่ไทยเป๊ะๆ) =================
async function fetchHistory() {
    currentPastPage = 1;
    const listToday = document.getElementById('listToday');
    const listPast = document.getElementById('listPast');
    const btnContainer = document.getElementById('btnLoadMoreContainer');

    // 🟢 1. พยายามดึงชื่อจากหลายๆ จุด เพื่อให้ได้ชื่อที่ถูกต้องที่สุด
    let nameFilter = document.getElementById('fullname').value;
    if (!nameFilter && selectPersonInstance) { nameFilter = selectPersonInstance.getValue(); }
    if (!nameFilter) { nameFilter = localStorage.getItem('sec_last_name'); }

    if (!nameFilter) {
        listToday.innerHTML = '<div class="text-center text-muted small py-4"><i class="bi bi-info-circle text-primary mb-2" style="font-size: 2rem; display: block;"></i>กรุณาเลือกรหัส/ชื่อ<br>ในหน้า "ลงเวลา" ก่อนดูประวัติครับ</div>';
        listPast.innerHTML = '<div class="text-center text-muted small py-4"><i class="bi bi-info-circle text-primary mb-2" style="font-size: 2rem; display: block;"></i>กรุณาเลือกรหัส/ชื่อ<br>ในหน้า "ลงเวลา" ก่อนดูประวัติครับ</div>';
        btnContainer.classList.add('d-none');
        return;
    }

    listToday.innerHTML = '<div class="text-center text-muted small py-3">กำลังโหลด...</div>';
    listPast.innerHTML = '<div class="text-center text-muted small py-3">กำลังโหลด...</div>';
    btnContainer.classList.add('d-none');

    try {
        // 🟢 2. บังคับใช้วันที่เวลาประเทศไทย (ป้องกันบั๊ก UTC ข้ามวัน)
        const todayLocal = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Bangkok"}));
        const yyyy = todayLocal.getFullYear();
        const mm = String(todayLocal.getMonth() + 1).padStart(2, '0');
        const dd = String(todayLocal.getDate()).padStart(2, '0');
        const todayStr = `${yyyy}-${mm}-${dd}`;
        
        // 🟢 3. ดึงข้อมูล "วันนี้"
        const { data: dataToday, error: errToday } = await db.from('guard_attendance')
            .select('*')
            .eq('work_date', todayStr)
            .eq('fullname', nameFilter) // ล็อกชื่อ
            .order('created_at', { ascending: false });

        if (errToday) throw errToday;

        // ใส่ป้ายบอกว่ากำลังดูของใครอยู่
        let htmlToday = `<div class="badge bg-primary bg-opacity-10 text-primary mb-3 w-100 py-2 fs-6 shadow-sm border">📅 ประวัติวันนี้ของ: ${nameFilter}</div>`;
        
        if (dataToday && dataToday.length > 0) {
            dataToday.forEach(item => { htmlToday += generateHistoryCard(item); });
        } else {
            htmlToday += '<div class="text-center text-muted small py-3">ไม่มีประวัติลงเวลาของวันนี้</div>';
        }
        listToday.innerHTML = htmlToday;

        // 🟢 4. โหลดข้อมูล "ย้อนหลัง" พร้อมส่งวันที่ไทยเข้าไป
        await loadPastHistory(nameFilter, todayStr);

    } catch (err) { console.error(err); }
}

async function loadPastHistory(nameFilter, todayStr) {
    try {
        const from = (currentPastPage - 1) * ITEMS_PER_PAGE;
        const to = from + ITEMS_PER_PAGE - 1;
        
        // ดึงย้อนหลังที่ วันที่ < วันนี้
        const { data: dataPast, error: errPast } = await db.from('guard_attendance')
            .select('*')
            .lt('work_date', todayStr)
            .eq('fullname', nameFilter) // ล็อกชื่อ
            .order('work_date', { ascending: false })
            .order('created_at', { ascending: false })
            .range(from, to);

        if (errPast) throw errPast;

        let htmlPast = '';
        // ถ้าเป็นหน้าแรก ให้แสดงป้ายชื่อด้วย
        if (currentPastPage === 1) {
            htmlPast = `<div class="badge bg-secondary bg-opacity-10 text-secondary mb-3 w-100 py-2 fs-6 shadow-sm border">⏳ ประวัติย้อนหลังของ: ${nameFilter}</div>`;
        }

        if (dataPast && dataPast.length > 0) {
            dataPast.forEach(item => { htmlPast += generateHistoryCard(item); });
        } else if (currentPastPage === 1) {
            htmlPast += '<div class="text-center text-muted small py-3">ไม่มีประวัติย้อนหลังในระบบ</div>';
        }

        const listPast = document.getElementById('listPast');
        if (currentPastPage === 1) {
            listPast.innerHTML = htmlPast;
        } else {
            listPast.insertAdjacentHTML('beforeend', htmlPast); 
        }

        // เช็คโชว์ปุ่ม Load More
        const btnContainer = document.getElementById('btnLoadMoreContainer');
        if (dataPast && dataPast.length === ITEMS_PER_PAGE) {
            btnContainer.classList.remove('d-none');
        } else {
            btnContainer.classList.add('d-none');
        }

    } catch (err) { console.error(err); }
}

function loadMorePast() {
    const btn = document.getElementById('btnLoadMore');
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1" style="width: 1rem; height: 1rem;"></span> กำลังโหลด...';
    btn.disabled = true;

    currentPastPage++; 
    
    let nameFilter = document.getElementById('fullname').value || localStorage.getItem('sec_last_name');
    const todayLocal = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Bangkok"}));
    const todayStr = `${todayLocal.getFullYear()}-${String(todayLocal.getMonth() + 1).padStart(2, '0')}-${String(todayLocal.getDate()).padStart(2, '0')}`;

    loadPastHistory(nameFilter, todayStr).then(() => {
        btn.innerHTML = 'ดูประวัติเก่ากว่านี้ <i class="bi bi-chevron-down"></i>';
        btn.disabled = false;
    });
}

// 🎨 ฟังก์ชันแยกสำหรับสร้างการ์ด HTML (เพื่อไม่ให้โค้ดซ้ำซ้อน)
function generateHistoryCard(item) {
    const shiftText = item.shift ? item.shift.split(' ')[0] : '-';
    const timeIn = item.time_in ? `<span class="text-success fw-bold">IN: ${item.time_in}</span>` : '-';
    const timeOut = item.time_out ? `<span class="text-danger fw-bold ms-2">OUT: ${item.time_out}</span>` : '';
    
    const actionBtns = `
        <div class="mt-2 text-end border-top pt-2">
            <button type="button" class="action-btn" onclick="userEdit('${item.id}', '${item.id_card}', '${item.time_in||''}', '${item.time_out||''}')"><i class="bi bi-pencil-square"></i> แก้ไข</button>
            <button type="button" class="action-btn delete ms-2" onclick="userDelete('${item.id}', '${item.id_card}')"><i class="bi bi-trash"></i> ลบ</button>
        </div>
    `;

    return `
        <div class="history-item animate__animated animate__fadeIn">
            <div class="d-flex justify-content-between align-items-center mb-1">
                <div class="fw-bold" style="color: var(--primary-color);"><i class="bi bi-calendar-event me-1"></i>${item.work_date}</div>
                <div class="badge bg-secondary bg-opacity-10 text-dark border">${shiftText}</div>
            </div>
            <div class="small text-muted mb-2"><i class="bi bi-person-vcard"></i> ${item.id_card} | ${item.remark_type} ${item.remark_detail ? `(${item.remark_detail})` : ''}</div>
            <div class="bg-light p-2 rounded text-center border" style="font-size: 0.9rem;">
                ${timeIn} ${timeOut}
            </div>
            ${actionBtns}
        </div>
    `;
}

// ================= USER EDIT/DELETE =================
async function verifyUser(id_card) {
    const { value: confirmId } = await Swal.fire({
        title: 'ยืนยันตัวตน', text: 'กรุณากรอก "รหัสบัตรประจำตัว" เพื่อยืนยัน',
        input: 'text', inputPlaceholder: 'เช่น G-001',
        showCancelButton: true, confirmButtonText: 'ยืนยัน', cancelButtonText: 'ยกเลิก',
        inputValidator: (value) => { if (!value) return 'กรุณากรอกรหัสบัตร!' }
    });
    return confirmId === id_card;
}

async function userEdit(id, id_card, currentIn, currentOut) {
    if(!(await verifyUser(id_card))) return Swal.fire('ผิดพลาด', 'รหัสบัตรไม่ตรงกับรายการนี้', 'error');

    const { value: formValues } = await Swal.fire({
        title: 'แก้ไขเวลา',
        html: `
            <div class="text-start mt-3">
                <label class="form-label text-success">เวลาเข้า</label>
                <input type="text" id="swal-in" value="${currentIn}" class="form-control mb-3 text-center" inputmode="numeric" placeholder="ระบุเวลา" maxlength="5" oninput="formatTime(this)">
                <label class="form-label text-danger">เวลาออก</label>
                <input type="text" id="swal-out" value="${currentOut}" class="form-control text-center" inputmode="numeric" placeholder="ระบุเวลา" maxlength="5" oninput="formatTime(this)">
            </div>
        `,
        focusConfirm: false, showCancelButton: true, confirmButtonText: 'บันทึก',
        preConfirm: () => { 
            const tin = document.getElementById('swal-in').value;
            const tout = document.getElementById('swal-out').value;
            if((tin && !validateTimeStr(tin)) || (tout && !validateTimeStr(tout))) { Swal.showValidationMessage('รูปแบบเวลาไม่ถูกต้อง (00:00 - 23:59)'); return false; }
            return { in: tin, out: tout };
        }
    });

    if (formValues) {
        Swal.fire({ title: 'กำลังบันทึก...', didOpen: () => Swal.showLoading() });
        const { error } = await db.from('guard_attendance').update({
            time_in: formValues.in || null, time_out: formValues.out || null,
            updated_at: new Date(), updated_by: 'User (รปภ.)'
        }).eq('id', id);

        if (error) Swal.fire('Error', 'แก้ไขไม่ได้', 'error');
        else { Swal.fire({ icon: 'success', title: 'อัปเดตเรียบร้อย', timer: 1500, showConfirmButton: false }); fetchHistory(); }
    }
}

async function userDelete(id, id_card) {
    if(!(await verifyUser(id_card))) return Swal.fire('ผิดพลาด', 'รหัสบัตรไม่ตรงกับรายการนี้', 'error');
    const res = await Swal.fire({ title: 'ยืนยันการลบ?', icon: 'warning', showCancelButton: true, confirmButtonColor: '#dc3545', confirmButtonText: 'ลบทิ้ง' });
    if(res.isConfirmed) {
        await db.from('guard_attendance').delete().eq('id', id);
        Swal.fire({ icon: 'success', title: 'ลบสำเร็จ', timer: 1500, showConfirmButton: false }); fetchHistory();
    }
}

// ================= SUBMIT FORM (🟢 อัปเดตเงื่อนไข Insert/Update) =================
document.getElementById('attendanceForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const time_in = document.getElementById('time_in').value || null;
    const time_out = document.getElementById('time_out').value || null;

    // ================= VALIDATE TIME (เฉพาะโหมดทำงาน) =================
    if (currentMode === 'work') {
        if(!time_in && !time_out) {
            return Swal.fire({
                icon: 'warning',
                title: 'ข้อมูลไม่ครบ',
                text: 'กรุณาระบุเวลาอย่างน้อย 1 ช่อง'
            });
        }

        if((time_in && !validateTimeStr(time_in)) || (time_out && !validateTimeStr(time_out))) {
            return Swal.fire({
                icon: 'error',
                title: 'เวลาผิดพลาด',
                text: 'กรุณากรอกเวลาให้ถูกต้อง (00:00 - 23:59)'
            });
        }
    }

    const remark_type = document.getElementById('remark_type').value;
    let final_remark_detail = null;

    if (remark_type.includes('แทน')) {
        final_remark_detail = document.getElementById('remark_substitute').value;
        if(!final_remark_detail) return Swal.fire({ icon: 'warning', title: 'ข้อมูลไม่ครบ', text: 'กรุณาเลือกชื่อผู้ที่ปฏิบัติงานแทน' });
    } else if (remark_type === 'อื่นๆ') {
        final_remark_detail = document.getElementById('remark_detail').value;
    }

    const btn = document.getElementById('btnSubmit');
    const originalText = btn.innerHTML; btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" style="width:1.2rem;height:1.2rem;color:white;"></span> กำลังบันทึก...';

    const payload = {
        work_date: document.getElementById('work_date').value,
        shift: document.getElementById('shift').value,
        id_card: document.getElementById('id_card').value,
        fullname: document.getElementById('fullname').value,
        time_in: time_in,
        time_out: time_out,
        remark_type: remark_type,
        remark_detail: final_remark_detail,
        profile_pic: document.getElementById('picUrl').value || null
    };

    // ================= 🏖️ HANDLE LEAVE MODE =================
    if (currentMode === 'leave') {
        const leaveType = document.getElementById('leave_type').value;

        if (!leaveType) {
            btn.disabled = false;
            btn.innerHTML = originalText;
            return Swal.fire({
                icon: 'warning',
                title: 'กรุณาเลือกประเภทการลา'
            });
        }

        payload.time_in = null;
        payload.time_out = null;
        payload.remark_type = leaveType;
        payload.remark_detail = null;
    }

    // ================= 🚫 PREVENT LEAVE IF SESSION ACTIVE =================
    if (currentMode === 'leave' && activeRecordId) {
        btn.disabled = false;
        btn.innerHTML = originalText;

        return Swal.fire({
            icon: 'warning',
            title: 'ไม่สามารถลางานได้',
            text: 'คุณยังไม่ได้ลงเวลาออกงาน กรุณาลงเวลาออกก่อน'
        });
    }

    try {
        if (activeRecordId) {
            // 🎯 กรณีที่ 1: กำลังออกงาน (อัปเดตแถวเดิมที่มีเวลาเข้าอยู่แล้ว)
            if (!time_out) {
                btn.disabled = false; btn.innerHTML = originalText;
                return Swal.fire({ icon: 'warning', title: 'ระบุเวลาออก', text: 'คุณลงเวลาเข้างานไปแล้ว กรุณาระบุเวลาออกงานด้วยครับ' });
            }
            const { error } = await db.from('guard_attendance').update({
                time_out: payload.time_out,
                remark_type: payload.remark_type,
                remark_detail: payload.remark_detail,
                profile_pic: payload.profile_pic
            }).eq('id', activeRecordId);
            if (error) throw error;
        } else {
            // 🎯 กรณีที่ 2: กำลังเข้างานใหม่ (หรือกรอกทีเดียว 2 ช่อง) (สร้างแถวใหม่)
            const { error } = await db.from('guard_attendance').insert([payload]);
            if (error) throw error;
        }

        localStorage.setItem('sec_last_card', payload.id_card);
        localStorage.setItem('sec_last_name', payload.fullname);
        localStorage.setItem('sec_last_shift', payload.shift);
        if (navigator.vibrate) navigator.vibrate(50);

        await Swal.fire({ icon: 'success', title: 'บันทึกสำเร็จ', timer: 1500, showConfirmButton: false });
        
        document.getElementById('time_in').value = ''; document.getElementById('time_out').value = '';
        document.getElementById('remark_type').value = 'ปกติ'; handleRemarkChange();
        
        checkActiveSession(); // 🟢 รีเซ็ตหน้าจอใหม่
        switchPage('history');

    } catch (err) { Swal.fire('เกิดข้อผิดพลาด', err.message, 'error'); } 
    finally { btn.disabled = false; btn.innerHTML = '<i class="bi bi-cloud-arrow-up-fill me-2"></i> บันทึกเวลาเข้าสู่ระบบ'; }
});
